
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: PRODUCT-SERVICE
          uri: lb://product-service
          predicates:
            - Path=/products/**


        - id: AUTH-SERVICE
          uri: lb://auth-service
          predicates:
            - Path=/auth/**


        - id: ORDER-SERVICE
          uri: lb://order-service
          predicates:
            - Path=/orders/**


        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**


server:
  port: 8763



